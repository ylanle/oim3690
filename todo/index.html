<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f3f4f6;
        color: #1f2937;
        font-family: Arial, sans-serif;
      }

      .todo-app {
        width: min(100%, 520px);
        padding: 32px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 12px 35px rgba(0, 0, 0, 0.1);
      }

      h1 {
        margin: 0 0 8px;
        text-align: center;
      }

      .subtitle {
        margin: 0 0 24px;
        color: #6b7280;
        text-align: center;
      }

      form {
        display: flex;
        gap: 10px;
      }

      #task-input {
        min-width: 0;
        flex: 1;
        padding: 12px 14px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font: inherit;
        outline: none;
      }

      #task-input:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
      }

      button {
        border: 0;
        border-radius: 8px;
        font: inherit;
        cursor: pointer;
      }

      .add-button {
        padding: 12px 18px;
        background: #4f46e5;
        color: white;
        font-weight: bold;
      }

      .add-button:hover {
        background: #4338ca;
      }

      ul {
        margin: 24px 0 0;
        padding: 0;
        list-style: none;
      }

      li {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 4px;
        border-bottom: 1px solid #e5e7eb;
      }

      li input {
        width: 18px;
        height: 18px;
        accent-color: #4f46e5;
        cursor: pointer;
      }

      .task-text {
        flex: 1;
        overflow-wrap: anywhere;
      }

      li.completed .task-text {
        color: #9ca3af;
        text-decoration: line-through;
      }

      .delete-button {
        padding: 6px 10px;
        background: #fee2e2;
        color: #b91c1c;
      }

      .delete-button:hover {
        background: #fecaca;
      }

      .empty-message {
        margin: 24px 0 0;
        color: #9ca3af;
        text-align: center;
      }

      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 22px;
        color: #6b7280;
        font-size: 0.9rem;
      }

      .clear-button {
        padding: 7px 10px;
        background: transparent;
        color: #6b7280;
      }

      .clear-button:hover {
        color: #b91c1c;
      }

      @media (max-width: 480px) {
        .todo-app {
          padding: 24px 18px;
        }

        form {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="todo-app">
      <h1>My To-Do List</h1>
      <p class="subtitle">Add a task and check it off when you're done.</p>

      <form id="todo-form">
        <input
          id="task-input"
          type="text"
          placeholder="Enter a task"
          maxlength="100"
          autocomplete="off"
          aria-label="New task"
          required
        />
        <button class="add-button" type="submit">Add</button>
      </form>

      <ul id="task-list" aria-live="polite"></ul>
      <p class="empty-message" id="empty-message">Your list is empty.</p>

      <div class="footer">
        <span id="task-count">0 tasks left</span>
        <button class="clear-button" id="clear-completed" type="button">
          Clear completed
        </button>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
